<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width, initial-scale=1.0">
        <meta name="description" content="Bean & Brew Booking Page">
        <title>Bean & Brew - Book</title>
        <link rel="stylesheet" href="style.css">
        <script defer src="script.js"></script>
        </head>
        <body>
            <header>
                <div class="logo-and-title">
                    <a href="index.html" id="logo-link"><img class="logo" src="images/logo.png" alt="Logo image"></a>
                    <div class="title-text">
                        <h1>Bean & Brew</h1>
                    </div>
                </div>
                <nav>
                    <div class="navbar">
                        <a href="index.html">Home</a>
                        <a href="menu.html">Menu</a>
                        <a href="book.html">Book</a>
                        <a href="gallery.html">Gallery</a>
                        <a href="contact.html">Contact</a>
                    </div>
                </nav>
            <hr>
            </header>
            <div class="flex-box">
                <div class="box">
                    <div class="box-text"><h2 class="sub-heading">Book a Table</h2>
                        <form id="booking-form" >
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" required>
                            <br>
                            <br>
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required>
                            <br>
                            <br>
                            <label for="guests">Number of Guests:</label>
                            <input type="number" id="guests" name="guests" required>
                            <br>
                            <br>
                            <label for="booking-date">Booking Date:</label>
                            <input type="date" id="booking-date" name="booking-date" required>
                            <br>
                            <br>
                            <label for="booking-time">Booking Time:</label>
                            <input type="time" id="booking-time" name="booking-time" required>
                            <br>
                            <br>
                            <input type="submit" value="Submit">
                        </form>
                    </div>
                </div>
            </div>
        </body>
</html>
