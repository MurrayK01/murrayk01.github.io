<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width, initial-scale=1.0">
        <meta name="description" content="Bean & Brew Contact Page">
        <title>Bean & Brew - Contact</title>
        <link rel="stylesheet" href="style.css">
        <script defer src="feedback.js"></script>
        </head>
        <body>
            <header>
                <div class="logo-and-title">
                    <a href="index.html" id="logo-link"><img class="logo" src="images/logo.png" alt="Logo image"></a>
                    <div class="title-text">
                        <h1>Bean & Brew</h1>
                    </div>
                </div>
                <nav>
                    <div class="navbar">
                        <a href="index.html">Home</a>
                        <a href="menu.html">Menu</a>
                        <a href="book.html">Book</a>
                        <a href="gallery.html">Gallery</a>
                        <a href="contact.html">Contact</a>
                    </div>
                </nav>
            <hr>
            </header>
            <h2>Contact Us</h2>
            <div class="flex-box">
                <div id="user-feedback">
                    <form id="feedback-form" >
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" required>
                            <br>
                            <br>
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required>
                            <br>
                            <br>
                            <label for="feedback">Feedback:</label>
                            <input type="text" id="feedback" name="feedback" required>
                            <br>
                            <br>
                            <input type="submit" value="Submit">
                        </form>
                </div>
                </div>
                    <div class="flex-box-contact">
                            <h2>Contact Information</h2>
                            <div class="flex-box">
                            
                            <h3>Phone Number:</h3>
                            <div class="filler"></div>
                            <p>
                            1234567890
                            </p>    
                        </div>
                        <div class="flex-box">
                            <h3>Email:</h3>
                        <div class="filler"></div>
                            <p>bean@brew.com</p>
                        </div>
                    </div>
                
        </body>
</html>
