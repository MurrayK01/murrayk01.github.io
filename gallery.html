<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width-device-width, initial-scale=1.0">
        <meta name="description" content="Bean & Brew Gallery Page">
        <title>Bean & Brew - Gallery</title>
        <link rel="stylesheet" href="style.css">
        <script defer src="script.js"></script>
        </head>
        <body>
            <header>
                <div class="logo-and-title">
                    <a href="index.html" id="logo-link"><img class="logo" src="images/logo.png" alt="Logo image"></a>
                    <div class="title-text">
                        <h1>Bean & Brew</h1>
                    </div>
                </div>
                <nav>
                    <div class="navbar">
                        <a href="index.html">Home</a>
                        <a href="menu.html">Menu</a>
                        <a href="book.html">Book</a>
                        <a href="gallery.html">Gallery</a>
                        <a href="contact.html">Contact</a>
                    </div>
                </nav>
            <hr>
            </header>
            <div class="flex-box">
                <div class="box">
                    <div class="box-text"><h2 class="sub-heading">Gallery</h2></div>
                    <div class="video-flex">
                    <video class="gallery-video" controls muted>
                            <source src="videos/video-wide.mp4" type="video/mp4">
                    </video>
                    <video class="gallery-video" controls muted>
                            <source src="videos/video-narrow.mp4" type="video/mp4">
                    </video>
                    </div>
                </div>
            </div>
            <div class="flex-box">
                <div class="box">
                    <div class="img-flex">
                            <img class="img-gallery" src="images/cafe-img-1.jpg" alt="Image of cafe interior">
                            <img class="img-gallery" src="images/cafe-img-2.jpg" alt="Image of cafe window view">
                            <img class="img-gallery" src="images/cafe-img-3.jpg" alt="Image of cafe till">
                            <img class="img-gallery" src="images/cafe-img-4.jpg" alt="Image of cafe boothes">
                            <img class="img-gallery" src="images/cafe-img-5.jpg" alt="Image of cafe interior">
                            <img class="img-gallery" src="images/cafe-img-6.jpg" alt="Image of cafe interior">
                            <img class="img-gallery" src="images/cafe-img-7.jpg" alt="Image of cafe exterior">
                            <img class="img-gallery" src="images/cafe-img-8.jpg" alt="Image of coffee">
                    </div>
                </div>
            </div>
        </body>
</html>
